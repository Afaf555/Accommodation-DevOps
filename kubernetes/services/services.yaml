apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: accommodation
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: accommodation
spec:
  selector:
    app: backend
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: accommodation
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80